<script>
  document.addEventListener("DOMContentLoaded", function() {
    
    const numeroImagenes = "";
    const imagenBase = "\/images\/pixel_donal.png";

    
    const imagenContainer = document.getElementById("imagen-container");
    const imagenElement = document.createElement("img");
    imagenElement.id = "imagenPrincipal";  
    imagenElement.alt = "cali";  

    
    let index = 1;
    imagenElement.src = `/images/${imagenBase}_${index}.jpeg`;

    
    imagenContainer.appendChild(imagenElement);

    
    setInterval(function() {
      
      index = (index % numeroImagenes) + 1;  

      
      imagenElement.src = `../../images/${imagenBase}_${index}.jpeg`;  
    }, 2000); 
  });
</script>
